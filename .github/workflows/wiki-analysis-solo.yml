name: AI Wiki Analysis solo

on:
  workflow_dispatch:
    inputs:
      topic:
        description: 'Topic to write about'
        required: true
        type: choice
        options:
          - Architecture
          - Setup-and-Configuration
          - How-It-Works
          - Security
          - Contributing
          - API-Reference
          - Troubleshooting
          - Changelog
          - Environment-Variables
          - GitHub-Actions-Pipeline

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests

      - name: Check if page exists
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TOPIC: ${{ github.event.inputs.topic }}
          REPO: ${{ github.repository }}
        run: |
          git clone "https://x-access-token:${GITHUB_TOKEN}@github.com/${REPO}.wiki.git" /tmp/wiki_check
          if [ -f "/tmp/wiki_check/${TOPIC}.md" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Page '${TOPIC}' already exists, skipping."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Page '${TOPIC}' not found, will generate."
          fi

      - name: Collect repo files
        if: steps.check.outputs.exists == 'false'
        run: |
          python - <<'EOF'
          import os, json

          INCLUDE_EXT = {'.py', '.js', '.ts', '.yml', '.yaml', '.md', '.json', '.sh'}
          EXCLUDE_DIRS = {'.git', 'node_modules', 'venv', '__pycache__', '.github'}

          files = {}
          for root, dirs, filenames in os.walk('.'):
              dirs[:] = [d for d in dirs if d not in EXCLUDE_DIRS]
              for fname in filenames:
                  ext = os.path.splitext(fname)[1]
                  if ext not in INCLUDE_EXT:
                      continue
                  path = os.path.join(root, fname).lstrip('./')
                  try:
                      with open(os.path.join(root, fname), 'r', encoding='utf-8', errors='ignore') as f:
                          content = f.read(1500)
                      files[path] = content
                  except:
                      pass

          with open('/tmp/repo_files.json', 'w') as f:
              json.dump(files, f)
          print(f"Collected {len(files)} files")
          EOF

      - name: Generate wiki page via Gemini
        if: steps.check.outputs.exists == 'false'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          REPO: ${{ github.repository }}
          TOPIC: ${{ github.event.inputs.topic }}
        run: |
          python - <<'EOF'
          import os, json, requests, time

          with open('/tmp/repo_files.json') as f:
              files = json.load(f)

          repo = os.environ['REPO']
          topic = os.environ['TOPIC']

          topic_filters = {
              "Architecture":            None,
              "Setup-and-Configuration": None,
              "How-It-Works":            None,
              "Security":                None,
              "Contributing":            None,
              "API-Reference":           {'.py'},
              "Troubleshooting":         None,
              "Changelog":               {'.md'},
              "Environment-Variables":   {'.py', '.yml', '.yaml'},
              "GitHub-Actions-Pipeline": {'.yml', '.yaml'},
          }

          topic_prompts = {
              "Architecture":            "Describe the project architecture: key files, how they interact, data flow, design decisions.",
              "Setup-and-Configuration": "Prerequisites, installation steps, all env variables and secrets with explanations.",
              "How-It-Works":            "Step-by-step runtime flow: triggers, logic, API calls, outputs.",
              "Security":                "What secrets are used, how auth works, potential risks, recommendations.",
              "Contributing":            "How to run locally, code style, PR process, testing.",
              "API-Reference":           "All external APIs used: endpoints, payloads, response formats, error handling.",
              "Troubleshooting":         "Common problems and solutions based on the codebase logic.",
              "Changelog":               "Key features and changes as a changelog-style entry.",
              "Environment-Variables":   "Full reference of every env var: name, purpose, example value, required or optional.",
              "GitHub-Actions-Pipeline": "How the CI/CD pipeline works: triggers, jobs, steps, secrets injection, permissions.",
          }

          exts = topic_filters.get(topic)
          file_dump = ""
          for path, content in files.items():
              if exts and os.path.splitext(path)[1] not in exts:
                  continue
              file_dump += f"\n\n### {path}\n```\n{content}\n```"
              if len(file_dump) > 40000:
                  file_dump += "\n\n[truncated...]"
                  break

          instruction = topic_prompts.get(topic, "Write a focused wiki page about this topic.")

          prompt = f"""Repository: {repo}

          Write a GitHub Wiki page about "{topic}".

          Instructions: {instruction}

          Rules:
          - Max 400 words
          - Use markdown headers (##, ###)
          - Be specific to THIS repository ({repo}), not generic
          - No intro like "This page covers..." — start directly with content
          - Do not repeat the page title as H1

          Repository contents:
          {file_dump}
          """

          headers = {"Content-Type": "application/json"}
          payload = {"contents": [{"parts": [{"text": prompt}]}]}
          models = ["gemini-2.5-flash", "gemini-2.0-flash", "gemini-1.5-flash"]

          result = None
          for model in models:
              url = f"https://generativelanguage.googleapis.com/v1beta/models/{model}:generateContent?key={os.environ['GEMINI_API_KEY']}"
              for attempt in range(3):
                  try:
                      resp = requests.post(url, json=payload, headers=headers, timeout=120)
                      if resp.status_code == 429:
                          wait = 15 * (2 ** attempt)
                          print(f"Rate limited, waiting {wait}s...")
                          time.sleep(wait)
                          continue
                      resp.raise_for_status()
                      result = resp.json()['candidates'][0]['content']['parts'][0]['text'].strip()
                      print(f"Success with {model}")
                      break
                  except Exception as e:
                      print(f"[{model}] attempt {attempt+1} failed: {e}")
                      time.sleep(10)
              if result:
                  break

          if not result:
              print("All models failed")
              exit(1)

          with open('/tmp/wiki_page.md', 'w') as f:
              f.write(result)

          print(f"Page generated for topic: {topic}")
          EOF

      - name: Push page and update Home
        if: steps.check.outputs.exists == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TOPIC: ${{ github.event.inputs.topic }}
          REPO: ${{ github.repository }}
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"

          cp /tmp/wiki_page.md "/tmp/wiki_check/${TOPIC}.md"

          REPO="${REPO}" python3 - <<'PYEOF'
          import os

          wiki_dir = "/tmp/wiki_check"
          home_file = os.path.join(wiki_dir, "Home.md")
          repo = os.environ['REPO']

          pages = sorted([
              f[:-3] for f in os.listdir(wiki_dir)
              if f.endswith(".md") and f != "Home.md"
          ])

          descriptions = {
              "Architecture":            "Project structure, key files and how they interact",
              "Setup-and-Configuration": "Prerequisites, installation and all env variables",
              "How-It-Works":            "Step-by-step runtime flow and logic",
              "Security":                "Secrets, auth, risks and recommendations",
              "Contributing":            "How to run locally, code style and PR process",
              "API-Reference":           "External APIs, endpoints and response formats",
              "Troubleshooting":         "Common problems and solutions",
              "Changelog":               "Key features and changes",
              "Environment-Variables":   "Full reference of every env var",
              "GitHub-Actions-Pipeline": "CI/CD triggers, jobs, steps and permissions",
          }

          lines = [
              "# 📚 Table of Contents",
              "",
              "> A collection of pages to help you understand, use, and contribute to this project.",
              "",
              "---",
              "",
              "| Page | Description |",
              "| --- | --- |",
          ]

          for page in pages:
              display = page.replace("-", " ")р
              desc = descriptions.get(page, "")
              lines.append(f"| [{display}]({page}) | {desc} |")

          lines += [
              "",
              "---",
              "",
              f"![pages](https://img.shields.io/badge/pages-{len(pages)}-blue?style=flat-square)",
              "[![auto](https://img.shields.io/badge/generated-OstinUA-purple?style=flat-square)](https://github.com/OstinUA)",
              "![wiki](https://img.shields.io/badge/wiki-up--to--date-green?style=flat-square)",
              f"![last commit](https://img.shields.io/github/last-commit/{repo}?style=flat-square)",
              f"![issues](https://img.shields.io/github/issues/{repo}?style=flat-square)",
          ]

          with open(home_file, "w") as f:
              f.write("\n".join(lines))

          print(f"Home updated with {len(pages)} pages")
          PYEOF

          cd /tmp/wiki_check
          git add .
          git diff --cached --quiet && exit 0
          git commit -m "wiki: add ${TOPIC} + update Home"
          git push
