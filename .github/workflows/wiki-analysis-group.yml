name: AI Wiki Analysis group

on:
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests

      - name: Collect repo files
        run: |
          python - <<'EOF'
          import os, json

          INCLUDE_EXT = {'.py', '.js', '.ts', '.yml', '.yaml', '.md', '.json', '.sh'}
          EXCLUDE_DIRS = {'.git', 'node_modules', 'venv', '__pycache__', '.github'}

          files = {}
          for root, dirs, filenames in os.walk('.'):
              dirs[:] = [d for d in dirs if d not in EXCLUDE_DIRS]
              for fname in filenames:
                  ext = os.path.splitext(fname)[1]
                  if ext not in INCLUDE_EXT:
                      continue
                  path = os.path.join(root, fname).lstrip('./')
                  try:
                      with open(os.path.join(root, fname), 'r', encoding='utf-8', errors='ignore') as f:
                          content = f.read(3000)
                      files[path] = content
                  except:
                      pass

          with open('/tmp/repo_files.json', 'w') as f:
              json.dump(files, f)
          print(f"Collected {len(files)} files")
          EOF

      - name: Generate all wiki pages via Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          REPO: ${{ github.repository }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          python - <<'EOF'
          import os, json, requests, time
          from datetime import datetime, timezone

          with open('/tmp/repo_files.json') as f:
              files = json.load(f)

          repo = os.environ['REPO']
          commit_sha = os.environ['COMMIT_SHA']
          generated_at = datetime.now(timezone.utc).strftime('%Y-%m-%d %H:%M UTC')

          topic_files = {
              "Architecture":            None,
              "Setup-and-Configuration": None,
              "How-It-Works":            None,
              "Security":                None,
              "Contributing":            None,
              "API-Reference":           {'.py'},
              "Troubleshooting":         None,
              "Changelog":               {'.md'},
              "Environment-Variables":   {'.py', '.yml', '.yaml'},
              "GitHub-Actions-Pipeline": {'.yml', '.yaml'},
          }

          topic_prompts = {
              "Architecture":            "Describe the project architecture: key files, how they interact, data flow, design decisions.",
              "Setup-and-Configuration": "Prerequisites, installation steps, all env variables and secrets with explanations.",
              "How-It-Works":            "Step-by-step runtime flow: triggers, logic, API calls, outputs.",
              "Security":                "What secrets are used, how auth works, potential risks, recommendations.",
              "Contributing":            "How to run locally, code style, PR process, testing.",
              "API-Reference":           "All external APIs used: endpoints, payloads, response formats, error handling.",
              "Troubleshooting":         "Common problems and solutions based on the codebase logic.",
              "Changelog":               "Key features and changes as a changelog-style entry.",
              "Environment-Variables":   "Full reference of every env var: name, purpose, example value, required or optional.",
              "GitHub-Actions-Pipeline": "How the CI/CD pipeline works: triggers, jobs, steps, secrets injection, permissions.",
          }

          def build_dump(exts=None):
              dump = ""
              for path, content in files.items():
                  if exts and os.path.splitext(path)[1] not in exts:
                      continue
                  dump += f"\n\n### {path}\n```\n{content}\n```"
                  if len(dump) > 80000:
                      dump += "\n\n[truncated...]"
                      break
              return dump

          headers = {"Content-Type": "application/json"}
          models = ["gemini-2.5-flash", "gemini-2.0-flash", "gemini-1.5-flash"]

          def call_gemini(prompt):
              payload = {"contents": [{"parts": [{"text": prompt}]}]}
              for model in models:
                  url = f"https://generativelanguage.googleapis.com/v1beta/models/{model}:generateContent?key={os.environ['GEMINI_API_KEY']}"
                  for attempt in range(3):
                      try:
                          resp = requests.post(url, json=payload, headers=headers, timeout=120)
                          if resp.status_code == 429:
                              wait = 15 * (2 ** attempt)
                              print(f"Rate limited, waiting {wait}s...")
                              time.sleep(wait)
                              continue
                          resp.raise_for_status()
                          return resp.json()['candidates'][0]['content']['parts'][0]['text'].strip()
                      except Exception as e:
                          print(f"[{model}] attempt {attempt+1} failed: {e}")
                          time.sleep(10)
              return None

          os.makedirs('/tmp/wiki_pages', exist_ok=True)

          failed = []
          footer_tpl = "\n\n---\n*Generated from [{sha}](https://github.com/{repo}/commit/{sha}) · {date}*"

          for topic, exts in topic_files.items():
              print(f"Generating: {topic}...")
              t0 = time.time()

              file_dump = build_dump(exts)
              prompt = f"""Repository: {repo}

          Write a GitHub Wiki page about "{topic}".

          Instructions: {topic_prompts[topic]}

          Rules:
          - Max 400 words
          - Use markdown headers (##, ###)
          - Be specific to THIS repository ({repo}), not generic
          - No intro like "This page covers..." — start directly with content
          - Do not repeat the page title as H1

          Repository contents:
          {file_dump}
          """
              result = call_gemini(prompt)
              elapsed = round(time.time() - t0, 1)

              if result:
                  footer = footer_tpl.format(sha=commit_sha[:7], repo=repo, date=generated_at)
                  with open(f'/tmp/wiki_pages/{topic}.md', 'w') as f:
                      f.write(result + footer)
                  print(f"Done: {topic} ({elapsed}s)")
              else:
                  failed.append(topic)
                  print(f"Failed: {topic}")

              time.sleep(3)

          if failed:
              print(f"\nFailed topics: {failed}")
              exit(1)

          print("All pages generated")
          EOF

      - name: Push all pages to Wiki
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"

          git clone "https://x-access-token:${GITHUB_TOKEN}@github.com/${REPO}.wiki.git" /tmp/wiki

          cp /tmp/wiki_pages/*.md /tmp/wiki/ 2>/dev/null || true

          cd /tmp/wiki
          git add .
          git diff --cached --quiet && exit 0
          git commit -m "wiki: bulk generate pages"
          git push
